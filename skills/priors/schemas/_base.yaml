# Base schema — common fields inherited by every entry type.
# Per-type schemas extend this with `required` additions and type-specific fields.
# Kept in-repo so the agent can reference it when writing entries AND contract
# tests can validate entries against it.
$schema: https://json-schema.org/draft/2020-12/schema
$id: priors://schemas/_base
title: Priors entry — common fields
type: object
required:
  - id
  - type
  - created
  - valid_from
  - valid_through
  - summary
  - tags
  - source
  - confidence
  - helpful_count
  - contradicted_count
  - status
  - supersedes
  - superseded_by
properties:
  id:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}-(correction|constraint|pattern|decision|dead-end|operator|open-question)-[a-z0-9-]+$"
  type:
    enum: [correction, constraint, pattern, decision, dead-end, operator, open-question]
  created:
    type: string
    format: date-time
  valid_from:
    type: string
    format: date
  valid_through:
    oneOf:
      - type: "null"
      - type: string
        format: date
  summary:
    type: string
    minLength: 1
  tags:
    type: array
    items:
      type: string
  source:
    type: object
    required: [session, commit, pr, files]
    properties:
      session: { oneOf: [{ type: "null" }, { type: string }] }
      commit:  { oneOf: [{ type: "null" }, { type: string }] }
      pr:      { oneOf: [{ type: "null" }, { type: string }, { type: integer }] }
      files:
        type: array
        items: { type: string }
  confidence:
    enum: [low, medium, high]
  helpful_count:
    type: integer
    minimum: 0
  contradicted_count:
    type: integer
    minimum: 0
  status:
    enum: [active, archived, superseded]
  supersedes:
    type: array
    items: { type: string }
  superseded_by:
    type: array
    items: { type: string }
