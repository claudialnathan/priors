$schema: https://json-schema.org/draft/2020-12/schema
$id: priors://schemas/dead-end
title: dead-end — tried, didn't work, don't retry
allOf:
  - $ref: ./_base.yaml
  - type: object
    required: [attempted, reasoning, failure, conclusion, retry_conditions]
    properties:
      type:
        const: dead-end
      attempted: { type: string, minLength: 1 }
      reasoning: { type: string, minLength: 1 }
      failure: { type: string, minLength: 1 }
      conclusion: { type: string, minLength: 1 }
      retry_conditions:
        type: array
        items: { type: string }
