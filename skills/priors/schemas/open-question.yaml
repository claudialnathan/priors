$schema: https://json-schema.org/draft/2020-12/schema
$id: priors://schemas/open-question
title: open-question — investigated, deferred
allOf:
  - $ref: ./_base.yaml
  - type: object
    required: [question, why_deferred, watch_for]
    properties:
      type:
        const: open-question
      question: { type: string, minLength: 1 }
      why_deferred: { type: string, minLength: 1 }
      watch_for:
        type: array
        items: { type: string }
