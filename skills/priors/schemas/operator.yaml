# operator.yaml — single rolling file, NOT a per-entry record.
#
# Design: this schema reflects the "no timeless user-belief storage"
# commitment. `/priors:init` writes only `as_of`, optionally
# `role_in_project`, and `known_back_pressure_targets`. The other
# fields exist for users who later volunteer them via /priors:log or
# direct edit — they are valid but NEVER populated at init time.
#
# Free-text operator content is stored as as_of-tagged `notes` entries
# that preserve the user's words verbatim, rather than paraphrased
# into attribute arrays.
$schema: https://json-schema.org/draft/2020-12/schema
$id: priors://schemas/operator
title: operator — rolling project-scoped operator context (single file)
type: object
required: [as_of]
properties:
  as_of:
    type: string
    format: date
  role_in_project:
    type: string
    minLength: 1
  known_back_pressure_targets:
    type: array
    items:
      type: object
      required: [path, type]
      properties:
        path:
          type: string
          minLength: 1
        type:
          enum: [hook, lint, format, typecheck, ci, other]
  notes:
    type: array
    items:
      type: object
      required: [as_of, quote]
      properties:
        as_of:
          type: string
          format: date
        quote:
          type: string
          minLength: 1
        from:
          type: string
  # Fields below are permitted but never populated by /priors:init.
  # They land only if the user volunteers content via /priors:log or
  # direct edit. Treat at retrieval time as "as of <as_of>" records.
  how_they_think:
    type: array
    items: { type: string }
  preferences:
    type: array
    items: { type: string }
  strengths:
    type: array
    items: { type: string }
  growth_edges:
    type: array
    items: { type: string }
  goals_for_this_project:
    type: array
    items: { type: string }
  epistemic_note:
    type: string
    minLength: 1
