$schema: https://json-schema.org/draft/2020-12/schema
$id: priors://schemas/decision
title: decision — choice with rationale preserved
allOf:
  - $ref: ./_base.yaml
  - type: object
    required: [question, chosen, alternatives, why, revisit_if]
    properties:
      type:
        const: decision
      question: { type: string, minLength: 1 }
      chosen: { type: string, minLength: 1 }
      alternatives:
        type: array
        items:
          oneOf:
            - type: string
            - type: object
              properties:
                option: { type: string }
                rejected_because: { type: string }
      why: { type: string, minLength: 1 }
      revisit_if: { type: string, minLength: 1 }
