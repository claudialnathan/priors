name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Verify CLI
        run: node bin/priors.js --help > /dev/null

      - name: Run tests
        run: npm test

      - name: Run regression evals
        run: node bin/priors.js evals
